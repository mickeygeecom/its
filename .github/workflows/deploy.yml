name: Deploy Hugo to GitHub Pages

on:
  push:
    branches: [ "main" ]  # or your branch

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # so we can push to gh-pages

    steps:
      # 1. Check out the repo and its submodules
      - uses: actions/checkout@v2
        with:
          submodules: true

      # 2. Setup Node.js environment
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      # 3. Build theme assets (npm)
      - name: Build theme assets
        run: |
          cd themes/geekblog
          npm install
          npm run build
          cd ../..

      # 4. Setup Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'

      # 5. Build the site
      - name: Build
        run: hugo

      # 6. Deploy to gh-pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_branch: gh-pages
          publish_dir: ./public
          github_token: ${{ secrets.GITHUB_TOKEN }}
